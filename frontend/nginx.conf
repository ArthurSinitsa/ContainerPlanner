server {
    add_header X-Frame-Options         "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options  "nosniff"                         always;
    add_header X-XSS-Protection        "1; mode=block"                   always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https://cdn.jsdelivr.net; connect-src 'self' http://localhost:8000;" always;

    listen 80;
    server_name localhost;

    # 1. Раздача фронтенда (React)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;

        # Пытаемся найти запрошенный файл ($uri), если нет - папку ($uri/),
        # если ничего нет - отдаем index.html
        try_files $uri $uri/ /index.html;
    }

    # 2. Проксирование запросов к API (Django)
    # Все запросы, начинающиеся на /api/, полетят в контейнер api на порт 8000
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Проксирование админки Django (если она тебе нужна)
    location /admin/ {
        proxy_pass http://api:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
